server:
  port: ${PORT:8089}

spring:
  application:
    name: dgac-ms-incidencias
    
  # Conexión a la base de datos de Neon parametrizada
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-falling-star-ap750sgq-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_yiu0FKXsCMA9}
    driver-class-name: org.postgresql.Driver
    
  # Configuración de JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

# ==============================================================
# CONFIGURACIÓN DE INTEGRACIÓN CON OTROS MICROSERVICIOS
# ==============================================================
# URL base para comunicarse con el MS de Planes de Vuelo
planes-vuelo:
  base-url: http://DGAC-MS-PLANES-VUELO

# ==============================================================
# CONFIGURACIÓN DE EUREKA (Indispensable para el ecosistema)
# ==============================================================
eureka:
  instance:
    hostname: localhost
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8080/eureka/}